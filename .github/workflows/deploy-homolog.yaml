name: Deploy Backend to VPS Homologação

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Executar Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Dar permissão ao Gradlew
        run: chmod +x gradlew

      - name: Executar testes
        run: ./gradlew test

      - name: Upload relatório de testes (em caso de falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7

  deploy:
    name: Build Docker e Deploy na VPS Homologação
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Instalar dependências
        run: sudo apt-get update && sudo apt-get install -y sshpass rsync

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Buildar imagem Docker
        run: |
          docker build \
            -f Dockerfile \
            -t logitrack-backend:homologacao-latest .

      - name: Salvar imagem Docker
        run: |
          echo "Salvando imagem Docker..."
          docker save logitrack-backend:homologacao-latest > logitrack-backend.tar
          echo "Tamanho do arquivo:"
          ls -lh logitrack-backend.tar

      - name: Criar diretório tmp na VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD_PROD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER_PROD }}@${{ secrets.VPS_HOST_PROD }} "mkdir -p /home/${{ secrets.VPS_USER_PROD }}/tmp"

      - name: Transferir imagem com rsync
        run: |
          echo "Transferindo imagem com rsync..."
          sshpass -p "${{ secrets.VPS_PASSWORD_PROD }}" rsync -avz --progress \
            -e "ssh -o StrictHostKeyChecking=no" \
            logitrack-backend.tar \
            ${{ secrets.VPS_USER_PROD }}@${{ secrets.VPS_HOST_PROD }}:/home/${{ secrets.VPS_USER_PROD }}/tmp/

      - name: Deploy Docker no VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST_PROD }}
          username: ${{ secrets.VPS_USER_PROD }}
          password: ${{ secrets.VPS_PASSWORD_PROD }}
          script: |
            set -e

            # Instalar Docker se não estiver instalado
            if ! command -v docker &> /dev/null; then
              echo "Instalando Docker..."
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo usermod -aG docker $USER
              sudo systemctl start docker
              sudo systemctl enable docker
              echo "✅ Docker instalado com sucesso"
            else
              echo "✅ Docker já está instalado"
            fi

            # Carregar nova imagem Docker
            echo "Carregando nova imagem Docker..."
            sudo docker load < /home/${{ secrets.VPS_USER_PROD }}/tmp/logitrack-backend.tar

            # ESTRATÉGIA FAST DEPLOY - Fire and Forget
            echo "Iniciando deploy rápido (fire-and-forget)..."

            # Gerar nome randômico para o novo container
            RANDOM_SUFFIX=$(date +%s%N | cut -b1-10)
            NEW_CONTAINER_NAME="logitrack-backend-${RANDOM_SUFFIX}"
            echo "Novo container: ${NEW_CONTAINER_NAME}"

            # Buscar e parar TODOS os containers com prefixo logitrack-backend
            echo "Buscando containers ativos com prefixo logitrack-backend..."
            EXISTING_CONTAINERS=$(sudo docker ps --filter "name=logitrack-backend" --format "{{.Names}}" || echo "")

            if [ ! -z "$EXISTING_CONTAINERS" ]; then
              echo "Parando containers antigos rapidamente:"
              echo "$EXISTING_CONTAINERS"
              echo "$EXISTING_CONTAINERS" | xargs -r -n1 -P5 sudo docker stop
            else
              echo "Nenhum container ativo encontrado com prefixo logitrack-backend"
            fi

            echo "Subindo novo container"
            sudo docker run -d \
              --name "${NEW_CONTAINER_NAME}" \
              --restart unless-stopped \
              -p 3440:3440 \
              --network host \
              --memory=1g \
              --cpus=1.5 \
              -e SPRING_PROFILES_ACTIVE=docker \
              -e SERVER_PORT=3440 \
              -e SPRING_DATASOURCE_URL=${{ secrets.DB_URL }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e SPRING_RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }} \
              -e SPRING_RABBITMQ_PORT=${{ secrets.RABBITMQ_PORT }} \
              -e SPRING_RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }} \
              -e SPRING_RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              --health-cmd="curl -f http://localhost:3440/actuator/health || curl -f http://localhost:3440 || exit 1" \
              --health-interval=30s \
              --health-timeout=10s \
              --health-retries=5 \
              --health-start-period=60s \
              logitrack-backend:homologacao-latest

            echo "Container ${NEW_CONTAINER_NAME} iniciado!"

            # CLEANUP ASSÍNCRONO EM BACKGROUND - NÃO TRAVA O DEPLOY
            echo "Iniciando cleanup assíncrono em background..."
            (
              # Aguardar para o novo container estabilizar
              sleep 45

              # Buscar novamente todos os containers com prefixo (exceto o novo)
              ALL_BACKEND_CONTAINERS=$(sudo docker ps -a --filter "name=logitrack-backend" --format "{{.Names}}" | grep -v "^${NEW_CONTAINER_NAME}$" || echo "")

              if [ ! -z "$ALL_BACKEND_CONTAINERS" ]; then
                echo "Removendo containers antigos em background:"
                echo "$ALL_BACKEND_CONTAINERS"
                echo "$ALL_BACKEND_CONTAINERS" | xargs -r -n1 -P5 sh -c 'sudo docker stop "$1" 2>/dev/null || true; sudo docker rm "$1" 2>/dev/null || true' _
              fi

              # Limpar imagens órfãs
              sudo docker image prune -f >/dev/null 2>&1 || true

              echo "Cleanup concluído - Container ativo: ${NEW_CONTAINER_NAME}"
            ) &

            # Não esperar o background job terminar
            echo "Deploy rápido concluído! Cleanup rodando em background..."

            # Remover imagens antigas principais (rápido)
            sudo docker image prune -f

            # Limpar arquivo temporário
            rm -f /home/${{ secrets.VPS_USER_PROD }}/tmp/logitrack-backend.tar
